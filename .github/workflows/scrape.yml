name: Weekly Data Scrape

on:
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:
  repository_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          repository: ZoniBoy00/gzw-scraper
          path: scraper
          token: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}

      - uses: actions/checkout@v4
        with:
          path: gzw-data

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests beautifulsoup4 lxml 2>&1 | tail -5

      - name: Scrape
        run: |
          cd scraper
          python scrape.py --all 2>&1
          python enrich_tasks.py 2>&1
          python categorize_tasks.py 2>&1
          python gen_frontend_data.py 2>&1

      - name: Copy to gzw-data
        run: |
          for f in scraper/data/*.json; do
            name=$(basename "$f")
            cp "$f" "gzw-data/data/$name"
          done

      - name: Normalise
        run: |
          cd gzw-data
          python3 scripts/normalise_data.py 2>&1 || true
          python3 scripts/reorder_data.py 2>&1 || true

      - name: Commit
        run: |
          cd gzw-data
          git config user.name "gzw-bot"
          git config user.email "bot@gzw-data.dev"
          if git status --porcelain data/ | grep -q .; then
            git add data/
            git commit -m "auto: update scraped data ($(date +%Y-%m-%d))"
            git push
          else
            echo "No changes."
          fi
