<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GZW Data API</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0f0f0f; color: #e0e0e0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }

    .topbar {
      background: #1a1a1a; border-bottom: 1px solid #2a2a2a; padding: 16px 24px;
      display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px;
    }
    .topbar h1 { font-size: 18px; font-weight: 700; color: #fff; display: flex; align-items: center; gap: 10px; }
    .topbar h1 .accent { color: #f0b429; }
    .topbar .links { display: flex; gap: 12px; font-size: 13px; }
    .topbar .links a { color: #888; text-decoration: none; }
    .topbar .links a:hover { color: #f0b429; }

    .rate-banner {
      margin: 16px 24px 0; padding: 10px 16px; background: #1a1a1a; border: 1px solid #2a2a2a;
      border-radius: 4px; display: flex; align-items: center; gap: 10px; font-size: 12px; color: #aaa; flex-wrap: wrap;
    }
    .rate-badge { background: #f0b42920; color: #f0b429; padding: 2px 8px; border-radius: 3px; font-weight: 700; font-size: 11px; }
    .rate-banner code { background: #222; padding: 1px 6px; border-radius: 2px; color: #e0e0e0; }
    .rate-banner .err { color: #e05252; }
    .rate-banner .self { color: #f0b429; text-decoration: none; margin-left: auto; }

    .container { max-width: 900px; margin: 0 auto; padding: 24px; }

    .card {
      background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 4px; margin-bottom: 12px; overflow: hidden;
    }
    .card-header {
      display: flex; align-items: center; gap: 12px; padding: 14px 18px; cursor: pointer;
      border-bottom: 1px solid #2a2a2a; user-select: none;
    }
    .card-header:hover { background: rgba(240,180,41,0.03); }
    .card-header .method {
      font-size: 11px; font-weight: 700; padding: 3px 10px; border-radius: 3px;
      background: #61affe; color: #fff; min-width: 48px; text-align: center;
    }
    .card-header .path { font-size: 14px; font-weight: 600; color: #fff; font-family: 'SF Mono', 'Fira Code', monospace; }
    .card-header .desc { font-size: 12px; color: #888; margin-left: auto; }
    .card-header .arrow { color: #555; transition: transform 0.2s; }
    .card-header .arrow.open { transform: rotate(180deg); }

    .card-body { padding: 0 18px; max-height: 0; overflow: hidden; transition: max-height 0.3s ease, padding 0.3s ease; }
    .card-body.open { max-height: 2000px; padding: 16px 18px; }

    .params { margin-bottom: 14px; }
    .params-title { font-size: 10px; font-weight: 700; color: #888; text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 8px; }
    .param-row { display: flex; align-items: center; gap: 10px; margin-bottom: 6px; }
    .param-row label { font-size: 12px; color: #ccc; min-width: 100px; }
    .param-row label span { color: #666; font-size: 10px; }
    .param-row input {
      background: #222; border: 1px solid #333; padding: 6px 10px; color: #e0e0e0;
      font-size: 12px; font-family: 'SF Mono', monospace; border-radius: 3px; flex: 1; max-width: 300px;
    }
    .param-row input:focus { outline: none; border-color: #f0b429; }

    .btn {
      padding: 8px 20px; font-size: 12px; font-weight: 600; border: none; border-radius: 3px;
      cursor: pointer; transition: opacity 0.2s; font-family: inherit;
    }
    .btn:hover { opacity: 0.9; }
    .btn-execute { background: #f0b429; color: #000; }
    .btn-clear { background: #333; color: #888; margin-left: 8px; }

    .response { margin-top: 12px; }
    .response pre {
      background: #111; border: 1px solid #2a2a2a; border-radius: 3px; padding: 12px 14px;
      font-size: 11px; font-family: 'SF Mono', 'Fira Code', monospace; overflow-x: auto;
      color: #e0e0e0; max-height: 500px; overflow-y: auto; white-space: pre-wrap;
    }
    .response .meta { font-size: 11px; color: #888; margin-bottom: 6px; display: flex; gap: 16px; }
    .response .meta .status { color: #4caf50; font-weight: 600; }
    .response .loading { color: #888; font-style: italic; }

    .footer { text-align: center; padding: 32px 24px; color: #555; font-size: 12px; border-top: 1px solid #1a1a1a; margin-top: 24px; }
    .footer a { color: #f0b429; text-decoration: none; }
    .footer a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="topbar">
    <h1><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#f0b429" stroke-width="2"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="3" fill="#f0b429"/><line x1="2" y1="12" x2="7" y2="12"/><line x1="17" y1="12" x2="22" y2="12"/><line x1="12" y1="2" x2="12" y2="7"/><line x1="12" y1="17" x2="12" y2="22"/></svg><span class="accent">GZW</span> Data API</h1>
    <div class="links">
      <a href="https://github.com/ZoniBoy00/gzw-data" target="_blank">GitHub</a>
      <a href="https://grayzonewarfare.com" target="_blank">Game</a>
      <a href="https://gzw-tools.vercel.app" target="_blank">GZW Tools</a>
    </div>
  </div>

  <div class="rate-banner">
    <span class="rate-badge">100 req/min</span>
    Rate limit: 100 requests per minute per IP. Returns
    <code>X-RateLimit-Limit</code>, <code>X-RateLimit-Remaining</code>,
    <code>X-RateLimit-Reset</code> headers.
    <span class="err">429</span> when exceeded.
    <a href="https://github.com/ZoniBoy00/gzw-data" class="self">Self-host →</a>
  </div>

  <div class="container" id="app">
    <div style="text-align:center;padding:40px;color:#666;">Loading...</div>
  </div>

  <div class="footer">
    Data from <a href="https://gray-zone-warfare.fandom.com" target="_blank">GZW Fandom Wiki</a> ·
    Not affiliated with M.A.G. Studios ·
    <a href="https://github.com/ZoniBoy00/gzw-data/blob/main/LICENSE" target="_blank">MIT License</a>
  </div>

  <script>
    const ENDPOINTS = [
      { path: '/api/armor', desc: 'Armor (61)', params: [
        { name: 'type', desc: 'Ballistic Vest, Helmet, Plate Carrier' },
        { name: 'material', desc: 'Aramid, Steel, Ceramic, UHMWPE' },
        { name: 'nij', desc: 'IIIA, III, III+, III++' },
      ]},
      { path: '/api/weapons', desc: 'Weapons (51)', params: [
        { name: 'type', desc: 'Assault Rifle, SMG, Pistol, DMR...' },
        { name: 'caliber', desc: '5.56x45mm, 7.62x39mm...' },
        { name: 'search', desc: 'Text search' },
      ]},
      { path: '/api/backpacks', desc: 'Backpacks & rigs (27)', params: [
        { name: 'type', desc: 'Backpack or Tactical Rig' },
      ]},
      { path: '/api/keys', desc: 'Keys (124)', params: [
        { name: 'location', desc: 'Ban Pa, Fort Narith, Tiger Bay...' },
      ]},
      { path: '/api/tasks', desc: 'Tasks (278)', params: [
        { name: 'vendor', desc: 'Handshake, Gunny, Lab Rat...' },
        { name: 'area', desc: 'Lamang, Fort Narith...' },
        { name: 'search', desc: 'Text search' },
      ]},
      { path: '/api/throwables', desc: 'Throwables (8)', params: [] },
      { path: '/api/images', desc: 'Image URLs (199)', params: [] },
      { path: '/api/stats', desc: 'Statistics', params: [] },
      { path: '/api/search', desc: 'Search', params: [
        { name: 'q', desc: 'Search query', required: true },
      ]},
    ];

    let openIdx = null;

    async function execute(endpoint, form) {
      const resultDiv = document.getElementById(`result-${endpoint.path.replace(/[^a-z]/g, '')}`);
      resultDiv.innerHTML = '<div class="loading">Requesting...</div>';
      const q = form ? new URLSearchParams(new FormData(form)).toString() : '';
      const url = q ? endpoint.path + '?' + q : endpoint.path;
      try {
        const res = await fetch(url);
        const text = await res.text();
        let pretty;
        try { pretty = JSON.stringify(JSON.parse(text), null, 2); } catch { pretty = text; }
        resultDiv.innerHTML = `
          <div class="meta">
            <span class="status">${res.status} ${res.statusText}</span>
            <span>X-RateLimit-Remaining: ${res.headers.get('X-RateLimit-Remaining') || '?'}</span>
          </div>
          <pre>${escapeHtml(pretty)}</pre>
        `;
      } catch (err) {
        resultDiv.innerHTML = `<div class="meta"><span style="color:#e05252;">Error: ${err.message}</span></div>`;
      }
    }

    function escapeHtml(s) {
      return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    function render() {
      let html = '<div style="margin-bottom:16px;">';
      html += '<p style="font-size:13px;color:#888;margin-bottom:4px;">Click an endpoint to test it:</p>';
      html += `<p style="font-size:11px;color:#666;">Base: <code style="color:#f0b429;">https://gzw-data.vercel.app</code></p>`;
      html += '</div>';

      ENDPOINTS.forEach((ep, i) => {
        const id = ep.path.replace(/[^a-z]/g, '');
        html += `<div class="card">`;
        html += `<div class="card-header" onclick="toggle(${i})">`;
        html += `<span class="method">GET</span>`;
        html += `<span class="path">${ep.path}</span>`;
        html += `<span class="desc">${ep.desc}</span>`;
        html += `<span class="arrow ${openIdx === i ? 'open' : ''}">▼</span>`;
        html += `</div>`;
        html += `<div class="card-body ${openIdx === i ? 'open' : ''}">`;
        html += `<form id="form-${id}" onsubmit="event.preventDefault(); execute(ENDPOINTS[${i}], this)">`;
        if (ep.params.length > 0) {
          html += `<div class="params"><div class="params-title">Query Parameters</div>`;
          ep.params.forEach(p => {
            html += `<div class="param-row">`;
            html += `<label>${p.name} <span>${p.required ? '(required)' : '(optional)'}</span></label>`;
            html += `<input type="text" name="${p.name}" placeholder="${p.desc}" ${p.required ? 'required' : ''}>`;
            html += `</div>`;
          });
          html += `</div>`;
        } else {
          html += `<p style="color:#666;font-size:11px;margin-bottom:12px;">No parameters</p>`;
        }
        html += `<button type="submit" class="btn btn-execute">Execute</button>`;
        html += `<button type="button" class="btn btn-clear" onclick="document.getElementById('result-${id}').innerHTML=''">Clear</button>`;
        html += `</form>`;
        html += `<div class="response" id="result-${id}"></div>`;
        html += `</div></div>`;
      });

      document.getElementById('app').innerHTML = html;
    }

    function toggle(i) {
      openIdx = openIdx === i ? null : i;
      render();
    }

    render();
  </script>
</body>
</html>
