<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GZW Data API</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #080a0a;
      background-image:
        radial-gradient(ellipse 80% 60% at 50% 0%, rgba(240,180,41,0.04) 0%, transparent 60%),
        radial-gradient(ellipse 60% 50% at 50% 100%, rgba(97,175,254,0.03) 0%, transparent 50%);
      color: #c8c8c8;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      min-height: 100vh;
    }

    /* ── Top bar ── */
    .topbar {
      background: rgba(18,20,22,0.95);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(240,180,41,0.08);
      padding: 14px 28px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .topbar h1 {
      font-size: 20px;
      font-weight: 800;
      color: #fff;
      display: flex;
      align-items: center;
      gap: 12px;
      letter-spacing: -0.3px;
    }
    .topbar h1 .logo {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      background: linear-gradient(135deg, rgba(240,180,41,0.15), rgba(240,180,41,0.05));
      border: 1px solid rgba(240,180,41,0.2);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }
    .topbar h1 .logo::after {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 8px;
      box-shadow: 0 0 20px rgba(240,180,41,0.1);
    }
    .topbar h1 .logo svg { display: block; }
    .topbar h1 .gzw { color: #f0b429; }
    .topbar h1 .sub { color: #666; font-weight: 400; font-size: 14px; margin-left: 2px; }

    .topbar .links { display: flex; gap: 20px; align-items: center; }
    .topbar .links a {
      color: #666;
      text-decoration: none;
      font-size: 13px;
      font-weight: 500;
      transition: color 0.15s;
      position: relative;
    }
    .topbar .links a::after {
      content: '';
      position: absolute;
      bottom: -2px;
      left: 0;
      right: 0;
      height: 1px;
      background: #f0b429;
      transform: scaleX(0);
      transition: transform 0.2s;
    }
    .topbar .links a:hover { color: #f0b429; }
    .topbar .links a:hover::after { transform: scaleX(1); }

    /* ── Banner ── */
    .banner-wrap {
      max-width: 860px;
      margin: 20px auto 0;
      padding: 0 24px;
    }
    .banner {
      background: linear-gradient(135deg, rgba(240,180,41,0.06), rgba(97,175,254,0.04));
      border: 1px solid rgba(240,180,41,0.1);
      border-radius: 10px;
      padding: 12px 18px;
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 12px;
      color: #888;
      flex-wrap: wrap;
    }
    .banner .tag {
      background: linear-gradient(135deg, rgba(240,180,41,0.15), rgba(240,180,41,0.08));
      color: #f0b429;
      padding: 3px 10px;
      border-radius: 5px;
      font-weight: 700;
      font-size: 10px;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      border: 1px solid rgba(240,180,41,0.15);
    }
    .banner code {
      background: rgba(255,255,255,0.06);
      padding: 1px 7px;
      border-radius: 4px;
      color: #d0d0d0;
      font-size: 11px;
    }
    .banner .err {
      color: #e05252;
      font-weight: 600;
      background: rgba(224,82,82,0.1);
      padding: 1px 6px;
      border-radius: 4px;
    }

    /* ── Main ── */
    .main { max-width: 860px; margin: 0 auto; padding: 20px 24px 40px; }

    .intro {
      background: linear-gradient(135deg, rgba(240,180,41,0.04), transparent);
      border: 1px solid rgba(240,180,41,0.06);
      border-radius: 10px;
      padding: 16px 20px;
      font-size: 13px;
      color: #999;
      line-height: 1.6;
      margin-bottom: 20px;
    }
    .intro code {
      color: #f0b429;
      background: rgba(240,180,41,0.08);
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 12px;
    }

    /* ── Filter ── */
    .filter-wrap {
      display: flex;
      gap: 10px;
      align-items: center;
      margin-bottom: 16px;
    }
    .filter-wrap input {
      flex: 1;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      padding: 10px 14px;
      color: #e0e0e0;
      font-size: 13px;
      border-radius: 8px;
      font-family: inherit;
      transition: border-color 0.2s, background 0.2s;
    }
    .filter-wrap input:focus {
      outline: none;
      border-color: rgba(240,180,41,0.3);
      background: rgba(240,180,41,0.03);
    }
    .filter-wrap input::placeholder { color: #555; }
    .filter-wrap .clear {
      cursor: pointer;
      color: #555;
      font-size: 20px;
      line-height: 1;
      padding: 4px 8px;
      border-radius: 6px;
      transition: background 0.15s, color 0.15s;
    }
    .filter-wrap .clear:hover { background: rgba(255,255,255,0.06); color: #888; }

    /* ── Counts ── */
    .counts {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 16px;
      font-size: 12px;
      color: #888;
    }
    .counts .chip {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.06);
      padding: 5px 12px;
      border-radius: 8px;
      color: #999;
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-weight: 400;
    }
    .counts .chip b {
      color: #f0b429;
      font-weight: 700;
      font-size: 14px;
    }
    .counts .hint {
      margin-left: auto;
      color: #555;
      font-size: 11px;
      display: inline-flex;
      align-items: center;
      gap: 4px;
    }
    .counts .hint code {
      background: rgba(255,255,255,0.05);
      padding: 1px 6px;
      border-radius: 4px;
      color: #777;
      font-size: 10px;
    }

    /* ── Category badges ── */
    .cat-badge {
      display: inline-block;
      font-size: 9px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      padding: 2px 8px;
      border-radius: 4px;
      margin-right: 8px;
    }

    /* ── Endpoint cards ── */
    .ep {
      background: rgba(18,20,22,0.6);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 10px;
      margin-bottom: 8px;
      overflow: hidden;
      transition: border-color 0.2s;
    }
    .ep:hover { border-color: rgba(255,255,255,0.1); }
    .ep.open { border-color: rgba(240,180,41,0.15); }

    .ep-hdr {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 13px 18px;
      cursor: pointer;
      user-select: none;
      transition: background 0.15s;
    }
    .ep-hdr:hover { background: rgba(240,180,41,0.03); }
    .ep-hdr .method {
      background: linear-gradient(135deg, #61affe, #4a8ed8);
      color: #fff;
      font-size: 10px;
      font-weight: 700;
      padding: 4px 10px;
      border-radius: 5px;
      min-width: 46px;
      text-align: center;
      letter-spacing: 0.3px;
      box-shadow: 0 2px 8px rgba(97,175,254,0.2);
    }
    .ep-hdr .path {
      font-size: 14px;
      font-weight: 600;
      color: #e8e8e8;
      font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
      letter-spacing: -0.3px;
    }
    .ep-hdr .desc {
      font-size: 12px;
      color: #777;
      margin-left: auto;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .ep-hdr .arrow {
      color: #444;
      font-size: 10px;
      transition: transform 0.2s;
      min-width: 16px;
      text-align: center;
    }
    .ep.open .ep-hdr .arrow { transform: rotate(180deg); }

    .ep-body { display: none; padding: 0 18px 16px; }
    .ep-body.open { display: block; animation: fadeIn 0.15s ease; }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-4px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* ── Params ── */
    .params { margin-bottom: 12px; }
    .params .title {
      font-size: 9px;
      color: #666;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      margin-bottom: 8px;
      font-weight: 600;
    }
    .params .row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 6px;
    }
    .params .row label {
      font-size: 12px;
      color: #aaa;
      min-width: 80px;
      font-weight: 500;
    }
    .params .row label .opt { color: #555; font-weight: 400; }
    .params .row input {
      background: rgba(0,0,0,0.3);
      border: 1px solid rgba(255,255,255,0.06);
      padding: 6px 10px;
      color: #e0e0e0;
      font-size: 12px;
      font-family: 'SF Mono', 'Fira Code', monospace;
      border-radius: 6px;
      width: 260px;
      transition: border-color 0.2s;
    }
    .params .row input:focus { outline: none; border-color: rgba(240,180,41,0.3); }

    /* ── Buttons ── */
    .btn {
      padding: 7px 18px;
      font-size: 12px;
      font-weight: 600;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.15s;
    }
    .btn-go {
      background: linear-gradient(135deg, #f0b429, #d49a1a);
      color: #000;
      box-shadow: 0 2px 10px rgba(240,180,41,0.2);
    }
    .btn-go:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 16px rgba(240,180,41,0.3);
    }
    .btn-go:active { transform: translateY(0); }
    .btn-clr {
      background: rgba(255,255,255,0.04);
      color: #666;
      border: 1px solid rgba(255,255,255,0.06);
      margin-left: 6px;
    }
    .btn-clr:hover { background: rgba(255,255,255,0.08); color: #888; }

    /* ── Response ── */
    .resp { margin-top: 12px; }
    .resp .meta {
      font-size: 11px;
      color: #888;
      margin-bottom: 6px;
      padding: 6px 10px;
      background: rgba(0,0,0,0.2);
      border-radius: 6px;
    }
    .resp .meta .ok { color: #4caf50; font-weight: 600; }
    .resp pre {
      background: rgba(0,0,0,0.3);
      border: 1px solid rgba(255,255,255,0.04);
      border-radius: 8px;
      padding: 14px 16px;
      font-size: 11px;
      font-family: 'SF Mono', 'Fira Code', monospace;
      overflow: auto;
      color: #c8c8c8;
      max-height: 400px;
      white-space: pre-wrap;
      line-height: 1.5;
    }

    /* ── Loading skeleton ── */
    .loading { text-align: center; padding: 60px 20px; }
    .loading .spinner {
      width: 28px; height: 28px;
      border: 2px solid rgba(240,180,41,0.1);
      border-top-color: #f0b429;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 12px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading p { color: #555; font-size: 13px; }

    /* ── Footer ── */
    .footer {
      text-align: center;
      padding: 32px;
      color: #444;
      font-size: 12px;
      border-top: 1px solid rgba(255,255,255,0.04);
      margin-top: 12px;
    }
    .footer a { color: #f0b429; text-decoration: none; opacity: 0.7; transition: opacity 0.15s; }
    .footer a:hover { opacity: 1; }

    /* ── Responsive ── */
    @media (max-width: 600px) {
      .topbar { padding: 12px 16px; }
      .topbar h1 { font-size: 16px; }
      .topbar h1 .sub { display: none; }
      .main { padding: 16px; }
      .banner-wrap { padding: 0 16px; }
      .ep-hdr { flex-wrap: wrap; gap: 6px; }
      .ep-hdr .desc { width: 100%; margin-left: 0; white-space: normal; }
      .params .row { flex-direction: column; align-items: stretch; }
      .params .row input { width: 100%; }
    }
  </style>
</head>
<body>
  <!-- Top bar -->
  <div class="topbar">
    <h1>
      <span class="logo">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#f0b429" stroke-width="2">
          <circle cx="12" cy="12" r="10"/>
          <circle cx="12" cy="12" r="3" fill="#f0b429"/>
          <line x1="2" y1="12" x2="7" y2="12"/>
          <line x1="17" y1="12" x2="22" y2="12"/>
          <line x1="12" y1="2" x2="12" y2="7"/>
          <line x1="12" y1="17" x2="12" y2="22"/>
        </svg>
      </span>
      <span><span class="gzw">GZW</span> Data API</span>
      <span class="sub">— Gray Zone Warfare</span>
    </h1>
    <nav class="links">
      <a href="https://github.com/ZoniBoy00/gzw-data" target="_blank">GitHub</a>
      <a href="https://grayzonewarfare.com" target="_blank">Game</a>
      <a href="https://gzw-tools.vercel.app" target="_blank">Tools</a>
    </nav>
  </div>

  <!-- Rate limit banner -->
  <div class="banner-wrap">
    <div class="banner">
      <span class="tag">100 req/min</span>
      Rate limited to 100 req/min/IP.
      Headers: <code>X-RateLimit-Limit</code> <code>X-RateLimit-Remaining</code> <code>X-RateLimit-Reset</code>.
      <span class="err">429</span> on overlimit.
    </div>
  </div>

  <!-- Main -->
  <div class="main" id="app">
    <div class="loading" id="loading">
      <div class="spinner"></div>
      <p>Loading datasets from API…</p>
    </div>

    <div id="content" style="display:none;">
      <div class="intro" id="intro"></div>

      <div class="filter-wrap">
        <input type="text" id="filter" placeholder="Filter by name…" oninput="render()">
        <span class="clear" onclick="document.getElementById('filter').value='';render()">&times;</span>
      </div>

      <div id="counts"></div>
      <div id="root"></div>
    </div>
  </div>

  <!-- Footer -->
  <div class="footer">
    Data from <a href="https://gray-zone-warfare.fandom.com" target="_blank">GZW Fandom Wiki</a> ·
    Not affiliated with M.A.G. Studios ·
    <a href="https://github.com/ZoniBoy00/gzw-data/blob/main/LICENSE" target="_blank">MIT License</a>
  </div>

  <script>
  // ── State ──
  let EPS = [];
  let open = -1;
  const inputs = {};

  function esc(s) { return String(s).replace(/[<>&"]/g, c => ({'<':'&lt;','>':'&gt;','&':'&amp;','"':'&quot;'})[c]); }

  // ── Category groups with colours ──
  const GROUPS = {
    weapon:    { label: 'WEAPONS',     color: '#e05252', keys: ['weapons','ammo','magazines','weapon_parts'] },
    armor:     { label: 'ARMOR',       color: '#4a9eff', keys: ['armor','vests','helmets','plate_carriers','glasses','face_cover','headsets','headwear_items','belts','apparel'] },
    gear:      { label: 'GEAR',        color: '#50c878', keys: ['backpacks','rigs','throwables','medical','provisions','food','drinks','containers','loot','loot_containers','gear'] },
    parts:     { label: 'PARTS',       color: '#a855f7', keys: ['weapon_parts','barrels','muzzle_devices','suppressors','stocks','stock_adapters','pistol_grips','foregrips','helmet_mods','helmet_mounts','night_vision'] },
    equipment: { label: 'EQUIPMENT',   color: '#f59e0b', keys: ['repair_kits','tools','military_equipment','task_items','keycards','keys'] },
    reference: { label: 'REFERENCE',   color: '#ec4899', keys: ['factions','info_pages','weapon_camos','tasks'] },
  };

  function getGroup(key) {
    for (const [gid, g] of Object.entries(GROUPS)) {
      if (g.keys.includes(key)) return g;
    }
    return null;
  }

  // ── Load endpoints from API ──
  async function loadEndpoints() {
    try {
      const res = await fetch('/api/stats');
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const json = await res.json();
      const stats = json.data || json;

      if (typeof stats === 'object') {
        const exclude = new Set(['armor_images', 'gzwtacmap_data', 'map_pois', 'weapon_images']);

        // Order by groups
        const ordered = [];
        const seen = new Set();
        for (const g of Object.values(GROUPS)) {
          for (const key of g.keys) {
            if (stats[key] && !exclude.has(key)) {
              ordered.push({ key, total: stats[key].total || stats[key] || 0 });
              seen.add(key);
            }
          }
        }
        for (const key of Object.keys(stats).sort()) {
          if (!seen.has(key) && !exclude.has(key)) {
            ordered.push({ key, total: stats[key].total || stats[key] || 0 });
          }
        }

        EPS = ordered.map(s => ({
          p: '/api/' + s.key,
          d: s.key.replace(/_/g, ' ') + ' (' + s.total + ')',
          sortKey: s.key,
          q: [],
        }));
      }

      // Show content
      document.getElementById('loading').style.display = 'none';
      document.getElementById('content').style.display = 'block';

      // Intro text
      document.getElementById('intro').innerHTML =
        `Base URL: <code>https://gzw-data.vercel.app</code> · ` +
        `<code>${EPS.length}</code> datasets, auto-discovered from <code>/api/stats</code>. ` +
        `Filter any field via <code>?field=value</code>. Use <code>?search=</code> for free text.`;

      render();
    } catch (e) {
      document.getElementById('loading').innerHTML =
        `<p style="color:#e05252;font-size:14px;">⚠ Failed to load: ${esc(e.message)}</p>` +
        `<p style="color:#666;font-size:12px;margin-top:8px;">Make sure the API is deployed and reachable.</p>`;
    }
  }

  // ── Lazy-load filters from spec ──
  let specCache = null;
  async function getFilters(path) {
    if (!specCache) {
      try {
        const res = await fetch('/api/spec');
        specCache = await res.json();
      } catch { return []; }
    }
    const route = specCache.paths?.[path]?.get;
    if (!route) return [];
    return (route.parameters || []).map(p => [p.name, 'Filter by ' + p.name]);
  }

  // ── Execute ──
  async function go(idx) {
    const ep = EPS[idx];
    const box = document.getElementById('r' + idx);
    if (!box) return;
    box.innerHTML = '<span style="color:#777;">Loading…</span>';

    const parts = [];
    for (const [name] of ep.q) {
      const el = inputs[idx]?.[name];
      const val = el?.value?.trim();
      if (val) parts.push(encodeURIComponent(name) + '=' + encodeURIComponent(val));
    }
    const qs = parts.length ? '?' + parts.join('&') : '';
    const url = ep.p + qs;

    try {
      const res = await fetch(url);
      const text = await res.text();
      let pretty;
      try { pretty = JSON.stringify(JSON.parse(text), null, 2); } catch { pretty = text; }
      const rem = res.headers.get('X-RateLimit-Remaining') || '?';
      box.innerHTML = `
        <div class="meta">Status: <span class="ok">${res.status}</span>
        · Remaining: ${rem}</div>
        <pre>${esc(pretty)}</pre>`;
    } catch (e) {
      box.innerHTML = `<div class="meta"><span style="color:#e05252;">Error: ${esc(e.message)}</span></div>`;
    }
  }

  function clr(idx) {
    const box = document.getElementById('r' + idx);
    if (box) box.innerHTML = '';
  }

  function toggle(idx) {
    if (open !== -1) {
      document.getElementById('b' + open)?.classList.remove('open');
      document.querySelectorAll('.ep')[open]?.classList.remove('open');
    }
    open = open === idx ? -1 : idx;
    if (open !== -1) {
      document.getElementById('b' + open)?.classList.add('open');
      document.querySelectorAll('.ep')[open]?.classList.add('open');
    }

    // Update arrows
    document.querySelectorAll('.arrow').forEach((el, i) => {
      const realIdx = Number(el.dataset.idx);
      el.textContent = realIdx === open ? '▲' : '▼';
    });

    // Lazy-load filters
    if (open !== -1 && EPS[open] && EPS[open].q.length === 0) {
      const idx = open;
      getFilters(EPS[idx].p).then(filters => {
        EPS[idx].q = filters;
        const container = document.getElementById('params-' + idx);
        if (!container) return;
        if (filters.length) {
          container.innerHTML = `<div class="params"><div class="title">Query parameters</div>` +
            filters.map(([name, placeholder]) =>
              `<div class="row"><label>${name} <span class="opt">(query)</span></label>` +
              `<input type="text" id="i${idx}_${name}" placeholder="${esc(placeholder)}"></div>`
            ).join('') + `</div>`;
          inputs[idx] = {};
          filters.forEach(([name]) => {
            const el = document.getElementById('i' + idx + '_' + name);
            if (el) {
              inputs[idx][name] = el;
              el.oninput = () => { inputs[idx][name] = el; };
            }
          });
        } else {
          container.innerHTML = '<p style="color:#666;font-size:11px;margin-bottom:10px;">No parameters</p>';
        }
      });
    }
  }

  // ── Render ──
  function render() {
    const filter = (document.getElementById('filter')?.value || '').toLowerCase();
    const filtered = filter ? EPS.filter(ep => ep.p.includes(filter) || ep.d.toLowerCase().includes(filter)) : EPS;

    // Counts bar
    if (EPS.length) {
      document.getElementById('counts').innerHTML =
        `<span class="chip">Datasets <b>${EPS.length}</b></span>` +
        `<span class="chip">Showing <b>${filtered.length}</b></span>` +
        `<span class="hint">Filter: <code>?field=value</code></span>`;
    }

    let html = '';
    filtered.forEach((ep, i) => {
      const realIdx = EPS.indexOf(ep);
      inputs[realIdx] = inputs[realIdx] || {};
      const group = getGroup(ep.sortKey);
      const badge = group ? `<span class="cat-badge" style="background:${group.color}18;color:${group.color};border:1px solid ${group.color}20;">${group.label}</span>` : '';

      html += `<div class="ep"><div class="ep-hdr" onclick="toggle(${realIdx})">`;
      html += `<span class="method">GET</span>`;
      html += badge;
      html += `<span class="path">${ep.p}</span>`;
      html += `<span class="desc">${ep.d}</span>`;
      html += `<span class="arrow" data-idx="${realIdx}">▼</span></div>`;
      html += `<div class="ep-body" id="b${realIdx}">`;
      html += `<div id="params-${realIdx}"><p style="color:#666;font-size:11px;margin-bottom:10px;">Loading parameters…</p></div>`;
      html += `<button class="btn btn-go" onclick="go(${realIdx})">Execute</button>`;
      html += `<button class="btn btn-clr" onclick="clr(${realIdx})">Clear</button>`;
      html += `<div class="resp" id="r${realIdx}"></div>`;
      html += `</div></div>`;
    });

    document.getElementById('root').innerHTML = html ||
      '<p style="color:#666;text-align:center;padding:60px 20px;font-size:14px;">No matching datasets</p>';
  }

  // ── Start ──
  loadEndpoints();
  </script>
</body>
</html>
