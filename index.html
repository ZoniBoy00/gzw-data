<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GZW Data API</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0f0f0f; color: #e0e0e0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }

    .topbar {
      background: #1a1a1a; border-bottom: 1px solid #2a2a2a; padding: 16px 24px;
      display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px;
    }
    .topbar h1 { font-size: 18px; font-weight: 700; color: #fff; display: flex; align-items: center; gap: 10px; }
    .topbar h1 .accent { color: #f0b429; }
    .topbar .links a { color: #888; text-decoration: none; font-size: 13px; }
    .topbar .links a:hover { color: #f0b429; }

    .banner {
      margin: 16px 24px 0; padding: 10px 16px; background: #1a1a1a; border: 1px solid #2a2a2a;
      border-radius: 4px; display: flex; align-items: center; gap: 10px; font-size: 12px; color: #aaa; flex-wrap: wrap;
    }
    .banner .tag { background: #f0b42920; color: #f0b429; padding: 2px 8px; border-radius: 3px; font-weight: 700; font-size: 11px; }
    .banner code { background: #222; padding: 1px 6px; border-radius: 2px; color: #e0e0e0; }
    .banner .err { color: #e05252; }

    .main { max-width: 800px; margin: 0 auto; padding: 24px; }
    .intro { font-size: 13px; color: #888; margin-bottom: 16px; }
    .intro code { color: #f0b429; background: #222; padding: 2px 6px; border-radius: 2px; }

    .ep { background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 4px; margin-bottom: 8px; }
    .ep-hdr {
      display: flex; align-items: center; gap: 12px; padding: 12px 16px; cursor: pointer;
      border-bottom: 1px solid #2a2a2a;
    }
    .ep-hdr:hover { background: rgba(240,180,41,0.03); }
    .ep-hdr .method {
      background: #61affe; color: #fff; font-size: 11px; font-weight: 700;
      padding: 3px 10px; border-radius: 3px; min-width: 48px; text-align: center;
    }
    .ep-hdr .path { font-size: 14px; font-weight: 600; color: #fff; font-family: monospace; }
    .ep-hdr .desc { font-size: 12px; color: #888; margin-left: auto; }
    .ep-hdr .arrow { color: #555; }
    .ep-body { display: none; padding: 14px 16px; }
    .ep-body.open { display: block; }

    .params { margin-bottom: 10px; }
    .params .title { font-size: 10px; color: #888; text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 6px; }
    .params .row { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
    .params .row label { font-size: 12px; color: #ccc; min-width: 80px; }
    .params .row label .opt { color: #666; }
    .params .row input {
      background: #222; border: 1px solid #333; padding: 5px 8px; color: #e0e0e0;
      font-size: 12px; font-family: monospace; border-radius: 3px; width: 250px;
    }
    .params .row input:focus { outline: none; border-color: #f0b429; }

    .btn { padding: 7px 18px; font-size: 12px; font-weight: 600; border: none; border-radius: 3px; cursor: pointer; }
    .btn-go { background: #f0b429; color: #000; }
    .btn-clr { background: #333; color: #888; margin-left: 6px; }

    .resp { margin-top: 10px; }
    .resp .meta { font-size: 11px; color: #888; margin-bottom: 4px; }
    .resp .meta .ok { color: #4caf50; font-weight: 600; }
    .resp pre {
      background: #111; border: 1px solid #2a2a2a; border-radius: 3px; padding: 10px 12px;
      font-size: 11px; font-family: monospace; overflow: auto; color: #e0e0e0;
      max-height: 400px; white-space: pre-wrap;
    }

    .footer { text-align: center; padding: 32px; color: #555; font-size: 12px; border-top: 1px solid #1a1a1a; margin-top: 24px; }
    .footer a { color: #f0b429; text-decoration: none; }
  </style>
</head>
<body>
  <!-- Top bar -->
  <div class="topbar">
    <h1>
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#f0b429" stroke-width="2">
        <circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="3" fill="#f0b429"/>
        <line x1="2" y1="12" x2="7" y2="12"/><line x1="17" y1="12" x2="22" y2="12"/>
        <line x1="12" y1="2" x2="12" y2="7"/><line x1="12" y1="17" x2="12" y2="22"/>
      </svg>
      <span style="color:#f0b429;">GZW</span> Data API
    </h1>
    <div class="links">
      <a href="https://github.com/ZoniBoy00/gzw-data" target="_blank">GitHub</a>
      <a href="https://grayzonewarfare.com" target="_blank">Game</a>
      <a href="https://gzw-tools.vercel.app" target="_blank">GZW Tools</a>
    </div>
  </div>

  <!-- Rate limit banner -->
  <div class="banner">
    <span class="tag">100 req/min</span>
    Rate limit: 100 requests per minute per IP.
    Returns <code>X-RateLimit-Limit</code>, <code>X-RateLimit-Remaining</code>, <code>X-RateLimit-Reset</code> headers.
    <span class="err">429</span> when exceeded.
  </div>

  <!-- Endpoints -->
  <div class="main" id="root"></div>

  <!-- Footer -->
  <div class="footer">
    Data from <a href="https://gray-zone-warfare.fandom.com" target="_blank">GZW Fandom Wiki</a> ·
    Not affiliated with M.A.G. Studios ·
    <a href="https://github.com/ZoniBoy00/gzw-data/blob/main/LICENSE" target="_blank">MIT License</a>
  </div>

  <script>
  // ── Endpoint definitions ──
  const EPS = [
    { p: '/api/armor', d: 'Armor (61)', q: [
      ['type', 'Ballistic Vest, Helmet, Plate Carrier'],
      ['material', 'Aramid, Steel, Ceramic, UHMWPE'],
      ['nij', 'IIIA, III, III+, III++'],
    ]},
    { p: '/api/weapons', d: 'Weapons (51)', q: [
      ['type', 'Assault Rifle, SMG, Pistol, DMR...'],
      ['caliber', '5.56x45mm, 7.62x39mm...'],
      ['search', 'Free text search'],
    ]},
    { p: '/api/backpacks', d: 'Backpacks & Rigs (27)', q: [
      ['type', 'Backpack or Tactical Rig'],
    ]},
    { p: '/api/keys', d: 'Keys (124)', q: [
      ['location', 'Ban Pa, Fort Narith, Tiger Bay...'],
    ]},
    { p: '/api/tasks', d: 'Tasks (278)', q: [
      ['vendor', 'Handshake, Gunny, Lab Rat...'],
      ['area', 'Lamang, Fort Narith...'],
      ['search', 'Free text search'],
    ]},
    { p: '/api/throwables', d: 'Throwables (8)', q: [] },
    { p: '/api/images', d: 'Image URLs (199)', q: [] },
    { p: '/api/stats', d: 'Statistics', q: [] },
    { p: '/api/search', d: 'Search', q: [
      ['q', 'Search query', 1],
    ]},
  ];

  // ── DOM refs ──
  let open = -1;
  const inputs = {};

  function esc(s) { return s.replace(/[<>&]/g, c => ({'<':'&lt;','>':'&gt;','&':'&amp;'})[c]); }

  // ── Execute ──
  async function go(idx) {
    const ep = EPS[idx];
    const box = document.getElementById('r' + idx);
    if (!box) return;
    box.innerHTML = '<span style="color:#888;">Loading...</span>';

    // Build query string
    const parts = [];
    for (const [name] of ep.q) {
      const val = inputs[idx]?.[name]?.trim();
      if (val) parts.push(encodeURIComponent(name) + '=' + encodeURIComponent(val));
    }
    const qs = parts.length ? '?' + parts.join('&') : '';
    const url = ep.p + qs;

    try {
      const res = await fetch(url);
      const text = await res.text();
      let pretty;
      try { pretty = JSON.stringify(JSON.parse(text), null, 2); } catch { pretty = text; }
      box.innerHTML = `
        <div class="meta">Status: <span class="ok">${res.status}</span>
        · Remaining: ${res.headers.get('X-RateLimit-Remaining') || '?'}</div>
        <pre>${esc(pretty)}</pre>`;
    } catch (e) {
      box.innerHTML = `<div class="meta"><span style="color:#e05252;">Error: ${esc(e.message)}</span></div>`;
    }
  }

  function clr(idx) {
    const box = document.getElementById('r' + idx);
    if (box) box.innerHTML = '';
  }

  function toggle(idx) {
    // Close previous
    if (open !== -1) document.getElementById('b' + open)?.classList.remove('open');
    // Toggle current
    open = open === idx ? -1 : idx;
    if (open !== -1) document.getElementById('b' + open)?.classList.add('open');
    // Update arrow icons
    document.querySelectorAll('.arrow').forEach((el, i) => { el.textContent = i === open ? '▼' : '▶'; });
  }

  // ── Render ──
  function render() {
    let html = '<p class="intro">Click an endpoint to expand. Base URL: <code>https://gzw-data.vercel.app</code></p>';

    EPS.forEach((ep, i) => {
      inputs[i] = {};

      html += `<div class="ep"><div class="ep-hdr" onclick="toggle(${i})">`;
      html += `<span class="method">GET</span><span class="path">${ep.p}</span>`;
      html += `<span class="desc">${ep.d}</span><span class="arrow">▶</span></div>`;
      html += `<div class="ep-body" id="b${i}">`;

      if (ep.q.length) {
        html += `<div class="params"><div class="title">Query parameters</div>`;
        ep.q.forEach(([name, placeholder]) => {
          html += `<div class="row"><label>${name} <span class="opt">(query)</span></label>`;
          html += `<input type="text" id="i${i}_${name}" placeholder="${esc(placeholder)}"></div>`;
        });
        html += `</div>`;
      } else {
        html += `<p style="color:#666;font-size:11px;margin-bottom:10px;">No parameters</p>`;
      }

      html += `<button class="btn btn-go" onclick="go(${i})">Execute</button>`;
      html += `<button class="btn btn-clr" onclick="clr(${i})">Clear</button>`;
      html += `<div class="resp" id="r${i}"></div>`;
      html += `</div></div>`;

      // Store input refs after DOM render
      setTimeout(() => {
        inputs[i] = {};
        ep.q.forEach(([name]) => {
          const el = document.getElementById('i' + i + '_' + name);
          if (el) inputs[i][name] = el;
          // Update on change
          if (el) el.oninput = () => { inputs[i][name] = el; };
        });
      }, 0);
    });

    document.getElementById('root').innerHTML = html;
  }

  render();
  </script>
</body>
</html>
